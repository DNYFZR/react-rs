name: Test

on:
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  execute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup Python env
        run: python -m venv .venv

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build app via Maturin
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release

      - name: Install app
        run: python -m pip install target/wheels/react_rs*.whl

      - name: Install Python test dependencies
        run: pip install pytest mock codecov pydocstyle pytest-cov pylint pylint_junit

      - name: Run tests
        run: pytest -v tests/ --doctest-modules --junitxml=unit-testresults.xml --cov=src/ --cov-append --cov-report=xml:xmlcov --cov-report=html:htmlcov

      - name: Publish reuslts
        uses: EnricoMi/publish-unit-test-result-action@v2
